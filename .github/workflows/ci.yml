name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency_audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

  dbt_validate:
    name: dbt Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create CI dbt profile
        shell: bash
        run: |
          mkdir -p $HOME/.dbt
          cat > $HOME/.dbt/profiles.yml << 'EOF'
          ecommerce_dbt:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ci-account
                user: ci-user
                password: ci-password
                role: dbt_role
                warehouse: dbt_wh
                database: ecommerce_db
                schema: analytics
                threads: 2
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt parse
        run: dbt parse