version: 2

models:
  - name: fct_sales
    description: "Order-grain fact table used by analytics and semantic metrics."
    config:
      contract:
        enforced: true
    columns:
      - name: order_key
        description: "Unique business key for each order."
        data_type: NUMBER
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_key
      - name: customer_key
        description: "Customer identifier associated with the order."
        data_type: NUMBER
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: order_date
        description: "Order creation date."
        data_type: DATE
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: status_code
        description: "Order status code from TPCH source."
        data_type: VARCHAR
        constraints:
          - type: not_null
        tests:
          - not_null
          - accepted_values:
              values: ['F', 'O', 'P']
      - name: total_price
        description: "Original order total amount from source orders table."
        data_type: NUMBER
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: gross_item_sales_amount
        description: "Sum of line-item extended price before discount."
        data_type: NUMBER
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: item_discount_amount
        description: "Discount amount represented as non-positive value."
        data_type: NUMBER
        tests:
          - not_null
          - dbt_utils.accepted_range:
              max_value: 0
              inclusive: true
      - name: net_item_sales_amount
        description: "Gross sales amount plus discount amount."
        data_type: NUMBER
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "gross_item_sales_amount + item_discount_amount = net_item_sales_amount"
